spring.application.name=demo
spring.datasource.url=jdbc:mysql://localhost:3307/aipoc?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=appuser
spring.datasource.password=appuser

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.redis.host=localhost
spring.redis.port=6379

openai.api.key=sk-xxxxxxxx
openai.url=https://api.openai.com/v1/chat/completions

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=ai-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Retry
resilience4j.retry.instances.openai.max-attempts=3
resilience4j.retry.instances.openai.wait-duration=1s

# Circuit Breaker
resilience4j.circuitbreaker.instances.openai.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openai.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.openai.wait-duration-in-open-state=10s