services:

  mysql:
    image: mysql:8
    container_name: mysql-aipoc
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aipoc
      MYSQL_USER: appuser
      MYSQL_PASSWORD: appuser
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
volumes:
  mysql_data: